name: Build Multi-Tenant Android Apps

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.6' # Stable version compatible with gradle templates

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm install

    - name: Run Build Tenant App Script
      run: node scripts/build-tenant-app.js ${{ github.event.client_payload.shopSlug }}
      env:
        # Firebase Credentials stored safely as GitHub repository secrets
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        ANDROID_HOME: /usr/local/lib/android/sdk
