name: Build Multi-Tenant Android Apps

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Debug Workspace Code
      run: |
        echo "=== Current Git Commit ==="
        git log -n 3
        echo "=== Checking main.dart for CONNECT ==="
        grep -n "CONNECT" flutter_app_template/lib/main.dart || echo "No CONNECT found in template main.dart"
        echo "=== Checking settings.gradle ==="
        cat flutter_app_template/android/settings.gradle

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Generate Gradle Wrapper for Template
      run: |
        flutter create --platforms=android temp_gradle_project
        cp -r temp_gradle_project/android/gradle flutter_app_template/android/
        cp temp_gradle_project/android/gradlew flutter_app_template/android/
        cp temp_gradle_project/android/gradlew.bat flutter_app_template/android/
        rm -rf temp_gradle_project
        sed -i -E 's/gradle-[0-9.]+(-all|-bin)\.zip/gradle-8.14.5-all.zip/g' flutter_app_template/android/gradle/wrapper/gradle-wrapper.properties

    - name: Flutter Doctor (Debug Info)
      run: flutter doctor -v

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses || true

    - name: Run Build Tenant App Script
      run: node scripts/build-tenant-app.js ${{ github.event.client_payload.shopSlug }} --github-actions
      env:
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
